name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore LogicFit.sln

      - name: Build
        run: dotnet build LogicFit.sln -c Release --no-restore

      - name: Test
        run: dotnet test LogicFit.sln -c Release --no-build --verbosity normal

      - name: Install EF CLI
        run: dotnet tool install --global dotnet-ef --version 8.*

      - name: Validate EF migrations
        run: dotnet ef migrations script --idempotent --no-build --project LogicFit.Infrastructure --startup-project LogicFit.API --output /tmp/logicfit-migrations.sql

  docker:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Build tenant image
        run: docker build -f LogicFit.API/Dockerfile -t logicfit-api:ci .
      - name: Build platform image
        run: docker build -f LogicFit.Platform.API/Dockerfile -t logicfit-platform-api:ci .
