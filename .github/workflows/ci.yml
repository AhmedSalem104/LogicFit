name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore LogicFit.sln

      - name: Build
        run: dotnet build LogicFit.sln -c Release --no-restore

      - name: Test
        run: dotnet test LogicFit.sln -c Release --no-build --verbosity normal
